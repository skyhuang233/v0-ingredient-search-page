<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Style Definitions -->
  <style>
    .node-box { fill: #E8F5E9; stroke: #81C784; stroke-width: 2; rx: 10; ry: 10; }
    .node-text { font-family: 'Microsoft YaHei', sans-serif; font-size: 16px; fill: #333333; font-weight: bold; text-anchor: middle; }
    .node-subtext { font-family: sans-serif; font-size: 12px; fill: #666666; text-anchor: middle; }
    .arrow { stroke: #81C784; stroke-width: 2; marker-end: url(#arrowhead); }
    .title { font-family: 'Microsoft YaHei', sans-serif; font-size: 24px; fill: #2E7D32; font-weight: bold; }
    /* Decoration matching user's PPT style */
    .deco-circle { fill: #A5D6A7; opacity: 0.6; }
  </style>
  
  <!-- Definitions for Arrowhead -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#81C784" />
    </marker>
  </defs>

  <!-- Background (Optional, can be transparent) -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- PPT Style Decorations (Green Blobs) -->
  <circle cx="750" cy="50" r="80" class="deco-circle" />
  <circle cx="50" cy="350" r="60" class="deco-circle" />

  <!-- Nodes -->
  <!-- 1. FastAPI -->
  <rect x="100" y="150" width="160" height="80" class="node-box" />
  <text x="180" y="185" class="node-text">FastAPI Backend</text>
  <text x="180" y="205" class="node-subtext">Async Handling</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="190" x2="310" y2="190" class="arrow" />

  <!-- 2. Embedding Model -->
  <rect x="310" y="150" width="160" height="80" class="node-box" />
  <text x="390" y="185" class="node-text">Embedding Model</text>
  <text x="390" y="205" class="node-subtext">Transformer / S-BERT</text>

  <!-- Arrow 2 -->
  <line x1="470" y1="190" x2="520" y2="190" class="arrow" />

  <!-- 3. Faiss DB -->
  <rect x="520" y="150" width="160" height="80" class="node-box" />
  <text x="600" y="185" class="node-text">Faiss Vector DB</text>
  <text x="600" y="205" class="node-subtext">Million-Scale Search</text>

  <!-- Title -->
  <text x="400" y="80" class="title" text-anchor="middle">Backend Architecture Flow</text>

</svg>
